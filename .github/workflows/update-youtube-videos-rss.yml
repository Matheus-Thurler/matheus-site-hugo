name: Update YouTube Videos (RSS)

on:
  schedule:
    - cron: '0 0 * * *' # Roda todo dia à meia-noite UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-rss:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.create_pr.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-rss.txt

      - name: Run update script
        env:
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CHANNEL_USERNAME: '@matheusthurler'
        run: python scripts/update-youtube-videos-rss.py

      - name: Commit and Push to a new branch
        id: create_pr
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          BRANCH_NAME="automation/update-youtube-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH_NAME"

          if [[ -n "$(git status --porcelain)" ]]; then
            git add data/youtube.json
            git commit -m "chore(youtube): update recent videos via RSS"
            git push origin "$BRANCH_NAME"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and Merge PR
        if: steps.create_pr.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_url=$(gh pr create \
            --title "chore(youtube): update recent videos via RSS" \
            --body "Automated update of YouTube videos from RSS feed." \
            --head "${{ steps.create_pr.outputs.branch_name }}" \
            --base master)

          gh pr merge "$pr_url" --merge --delete-branch

  deploy:
    needs: update-rss
    if: needs.update-rss.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          submodules: true
          fetch-depth: 0

      - name: Install Hugo with deploy support
        run: |
          curl -L -o hugo.tar.gz https://github.com/gohugoio/hugo/releases/download/v0.152.2/hugo_extended_withdeploy_0.152.2_linux-amd64.tar.gz
          tar -xvf hugo.tar.gz
          sudo mv hugo /usr/local/bin/
          hugo version

      - name: Build
        run: hugo --minify

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MATHEUS_CLOUD_PESSOAL }}

      - name: Deploy to Firebase Hosting
        run: bash scripts/firebase-deploy.sh
