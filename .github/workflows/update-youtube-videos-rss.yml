name: Update YouTube Videos (RSS)

on:
  schedule:
    - cron: '0 0 * * *' # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente

permissions:
  contents: write
  pull-requests: write

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-rss.txt

      - name: Run update script
        run: python scripts/update-youtube-videos-rss.py

      - name: Commit and Push to a new branch
        id: create_pr
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          BRANCH_NAME="automation/update-youtube-$(date +%Y%m%d%H%M%S)"
          git checkout -b $BRANCH_NAME
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git add .
            git commit -m "🎬 Update recent YouTube videos via RSS [automated]"
            git push origin $BRANCH_NAME
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Auto-merge PR
        if: steps.create_pr.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_url=$(gh pr create \
            --title "🎬 Update YouTube Videos (RSS)" \
            --body "Automated update of YouTube videos from RSS feed." \
            --branch ${{ steps.create_pr.outputs.branch_name }} \
            --base master)
          
          gh pr merge "$pr_url" --auto --merge
