{{/* Newsletter Signup Widget */}}
{{ $subscribeUrl := site.Params.newsletter.subscribeUrl | default "#" }}

<div class="bg-card border-border rounded-xl border p-6 shadow-sm mb-6">
  <div class="flex flex-col items-center text-center gap-4">
    <div class="text-primary text-3xl">📬</div>
    <div>
      <h3 class="text-foreground text-lg font-semibold mb-2">{{ i18n "newsletter.title" }}</h3>
      <p class="text-muted-foreground text-sm leading-relaxed mb-4">
        {{ i18n "newsletter.desc" }}
      </p>
    </div>
    <form
      id="newsletter-form"
      action="{{ $subscribeUrl }}"
      method="POST"
      class="w-full max-w-md flex flex-col sm:flex-row gap-2"
    >
      <input
        type="email"
        name="email"
        required
        placeholder="{{ i18n "newsletter.email_placeholder" }}"
        class="bg-muted border-border text-foreground placeholder:text-muted-foreground flex-1 rounded-lg border px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none"
        aria-label="{{ i18n "newsletter.email_label" }}"
      />
      <input
        type="text"
        name="name"
        required
        placeholder="{{ i18n "newsletter.name_placeholder" }}"
        class="bg-muted border-border text-foreground placeholder:text-muted-foreground flex-1 rounded-lg border px-4 py-2.5 text-sm focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none"
        aria-label="{{ i18n "newsletter.name_label" }}"
      />
      <button
        type="submit"
        class="bg-primary text-primary-foreground hover:bg-primary/90 rounded-lg px-5 py-2.5 text-sm font-medium transition-colors whitespace-nowrap"
      >
        {{ i18n "newsletter.subscribe" }}
      </button>
    </form>
    <p id="newsletter-msg" class="text-sm hidden"></p>
  </div>
</div>

<script>
document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const msg = document.getElementById('newsletter-msg');
  const data = { email: form.email.value, name: form.name.value };

  try {
    const res = await fetch(form.action, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const json = await res.json();
    msg.classList.remove('hidden', 'text-red-400');
    if (res.ok) {
      msg.classList.add('text-green-400');
      msg.textContent = '{{ i18n "newsletter.success" }}';
      form.reset();
    } else {
      msg.classList.add('text-red-400');
      msg.textContent = json.error || '{{ i18n "newsletter.error_msg" }}';
    }
  } catch {
    msg.classList.remove('hidden');
    msg.classList.add('text-red-400');
    msg.textContent = '{{ i18n "newsletter.error_msg" }}';
  }
});
</script>
